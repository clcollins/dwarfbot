name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CONTAINER_SUBSYS: podman
  IMAGE_REGISTRY: quay.io
  IMAGE_NAME: quay.io/clcollins/dwarfbot
  CI_IMAGE: dwarfbot-ci

jobs:
  ci-build:
    name: Build CI Container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build CI container image
        run: podman build -f test/Containerfile.ci -t ${{ env.CI_IMAGE }} .
      - name: Save CI image
        run: podman save ${{ env.CI_IMAGE }} -o /tmp/ci-image.tar
      - name: Upload CI image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-image
          path: /tmp/ci-image.tar
          retention-days: 1

  fmt:
    name: Go Format
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Check formatting
        run: |
          podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make fmt
          git diff --exit-code

  vet:
    name: Go Vet
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run go vet
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make vet

  lint:
    name: Go Lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run golangci-lint
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make lint

  go-test:
    name: Go Test
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run tests with race detector
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make go-test
      - name: Run tests with coverage
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} go test -coverprofile=coverage.txt -count=1 ./...
      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Go Build
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Build binary
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make build
      - name: Verify binary runs
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} ./out/dwarfbot --help

  checkmake:
    name: Makefile Lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run checkmake
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make checkmake

  mdlint:
    name: Markdown Lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run markdownlint
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make mdlint

  yamllint:
    name: YAML Lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run yamllint
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make yamllint

  kubeconform:
    name: Kubernetes Manifest Validation
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Validate manifests
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make kubeconform

  containerfile-check:
    name: Containerfile Validation
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Validate Containerfile
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make containerfile-check

  shellcheck:
    name: Shell Lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Run shellcheck
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make shellcheck

  doc-check:
    name: Documentation Check
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
          path: /tmp
      - name: Load CI image
        run: podman load -i /tmp/ci-image.tar
      - name: Check plan documents
        run: podman run --rm -v $(pwd):/src:Z -w /src ${{ env.CI_IMAGE }} make doc-check

  image-build:
    name: Container Image Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
      - name: Build container image
        run: |
          podman build -f Containerfile \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=$(git rev-parse HEAD) \
            --build-arg VERSION=ci \
            -t ${{ env.IMAGE_NAME }}:ci .
      - name: Validate OCI labels
        run: |
          echo "Checking OCI labels..."
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.title"}}' | grep -q "dwarfbot"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.version"}}' | grep -q "ci"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "is.collins.cluster.build.commit.id"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "io.k8s.display-name"}}' | grep -q "dwarfbot"
          echo "All OCI labels validated successfully."
      - name: Validate image runs
        run: podman run --rm ${{ env.IMAGE_NAME }}:ci --help
